<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
            height: 100vh;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card p-4 col-md-4">

        <h3 class="text-center fw-bold">Welcome Back</h3>
        <p class="text-center text-muted small mb-3">Login to Student Management System</p>

        <!-- FLASH MESSAGE -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{category}} text-center py-2">
                {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <!-- ERROR MESSAGE -->
        {% if error %}
        <div class="alert alert-danger text-center py-2">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <input type="text" name="username" class="form-control mb-3"
                   placeholder="Username" required>

            <!-- PASSWORD WITH TOGGLE -->
            <div class="input-group mb-3">
                <input type="password" name="password" id="password"
                       class="form-control" placeholder="Password" required>

                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                    👁️
                </button>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <div class="text-center mt-3">
            <p class="mb-0">Don't have an account?</p>
            <a href="{{ url_for('register') }}" class="btn btn-link">Register here</a>
        </div>

    </div>
</div>

<script>
function togglePassword() {
    const field = document.getElementById("password");
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
