<!DOCTYPE html>
<html>
<head>
    <title>Add Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h4 class="mb-3">Add New Result</h4>

        <form action="/add" method="POST">
            <input type="text" name="name" class="form-control mb-2" placeholder="Student Name" required>
            <input type="text" name="roll_no" class="form-control mb-2" placeholder="Roll No" required>
            <input type="text" name="subject" class="form-control mb-2" placeholder="Subject" required>
            <input type="number" name="marks" class="form-control mb-2" placeholder="Marks" required>

            <button class="btn btn-primary w-100">Submit</button>
        </form>

        <a href="/" class="btn btn-secondary mt-2 w-100">Back</a>
    </div>
</div>

</body>
</html>
